name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release jars
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout Minecraft 26.2 release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          path: mc-26.2

      - name: Checkout Minecraft 26.1.2 branch
        uses: actions/checkout@v4
        with:
          ref: mc-26.1.2
          path: mc-26.1.2

      - name: Checkout Minecraft 1.21.11 branch
        uses: actions/checkout@v4
        with:
          ref: mc-1.21.11
          path: mc-1.21.11

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release jars
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          build_variant() {
            local mc_version="$1"
            local project_dir="$2"

            echo "Building TempestBridge for Minecraft ${mc_version} from ${project_dir}"
            "${project_dir}/gradlew" -p "$project_dir" clean build --stacktrace --warning-mode=summary

            local jar
            jar="$(find "$project_dir/build/libs" -maxdepth 1 -type f -name '*.jar' ! -name '*-dev.jar' ! -name '*-sources.jar' | head -n 1)"
            if [ -z "$jar" ]; then
              echo "No release jar found in ${project_dir}/build/libs" >&2
              exit 1
            fi

            local mod_version
            mod_version="$(grep '^mod_version=' "$project_dir/gradle.properties" | cut -d= -f2)"
            if [ -z "$mod_version" ]; then
              echo "Could not read mod_version from ${project_dir}/gradle.properties" >&2
              exit 1
            fi

            local out="release-assets/tempestbridge-${mod_version}+mc${mc_version}.jar"
            cp "$jar" "$out"
            echo "Created ${out}"
          }

          build_variant "26.2" "mc-26.2"
          build_variant "26.1.2" "mc-26.1.2"
          build_variant "1.21.11" "mc-1.21.11"

          echo "Release assets:"
          ls -lh release-assets

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; uploading/replacing jar assets."
            gh release upload "$TAG" release-assets/*.jar \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG" release-assets/*.jar \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes
          fi
