name: Build

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build mod jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --stacktrace --warning-mode=summary

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: tempestbridge-mod-jar
          path: build/libs/*.jar
          if-no-files-found: error
